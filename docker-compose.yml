services:
  postgres:
    image: postgres:15
    container_name: crossword_postgres
    environment:
      POSTGRES_DB: crossword_db
      POSTGRES_USER: crossword_user
      POSTGRES_PASSWORD: "strong_password"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: crossword_backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crossword_db
      SPRING_DATASOURCE_USERNAME: crossword_user
      SPRING_DATASOURCE_PASSWORD: "strong_password"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:4200,http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  postgres_data: